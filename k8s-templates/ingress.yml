# routes HTTP traffic to services based on host/path
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: myapp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-app-svc
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: my-api-svc
                port:
                  number: 8080
  # uncomment for HTTPS
  # tls:
  #   - hosts:
  #       - myapp.example.com
  #     secretName: my-tls-secret
